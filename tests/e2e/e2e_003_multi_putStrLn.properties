# Do-notation desugaring works correctly, but the GRIN IR contains inline lambda
# expressions that the LLVM backend cannot translate. The backend only handles
# top-level functions (def.params) and doesn't support generating code for
# inline lambdas in function bodies.
#
# The lambda lifting pass (#313) lifts lambda expressions to top-level functions,
# but do-notation's nested lambdas (from bind chains like ...) x -> ...) may need
# additional lifting support or inline lambda codegen in the backend.
#
# Format name fix (#466) ensures function names always include unique suffix, but
# the deeper problem is lambda creation/tracking in LLVM backend.
skip: Do-notation needs lambda lifting enhancement or inline lambda codegen support
